# Ruff configuration.
# CI runs error-level checks only (real bugs: syntax errors, undefined names,
# broken f-strings, duplicate args) so the build stays meaningful without
# failing on subjective style. Run `ruff check .` locally; `ruff check --fix`
# to auto-fix, and `ruff format` if you want opinionated formatting.

line-length = 100
target-version = "py310"

[lint]
# E9: syntax errors | F63/F7/F82: pyflakes logic errors & undefined names
select = ["E9", "F63", "F7", "F82"]
