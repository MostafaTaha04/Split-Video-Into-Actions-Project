name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test/analysis dependencies
        # The heavy vision deps (mediapipe, ultralytics) are imported lazily and
        # are not needed to run the test suite, which exercises the metrics and
        # the offline re-segmentation on saved features.
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0" "scipy>=1.10" "opencv-python-headless" matplotlib ruptures ruff

      - name: Lint (ruff — error-level checks)
        run: ruff check .

      - name: Run tests
        run: python -m unittest discover -s tests -v
